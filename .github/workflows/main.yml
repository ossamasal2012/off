name: Build Iron Shield APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create build_dir com.ironshield.app "IronShield"
          cp index.html build_dir/www/
          cd build_dir
          cordova platform add android
          
      - name: Build Android APK (Debug)
        run: |
          cd build_dir
          cordova build android --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: iron-shield-debug-apk
          path: build_dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk
