# ============================================================
#  StudyLock — Ultra-Strict Android APK Build Pipeline
#  GitHub Actions | Capacitor + Android SDK
#
#  المتطلبات (Secrets يجب إضافتها في Settings > Secrets):
#    KEYSTORE_BASE64      — ملف keystore مشفر base64
#    KEYSTORE_PASSWORD    — كلمة مرور الـ keystore
#    KEY_ALIAS            — اسم المفتاح داخل الـ keystore
#    KEY_PASSWORD         — كلمة مرور المفتاح
#    SLACK_WEBHOOK        — (اختياري) رابط Slack للإشعارات
# ============================================================

name: 🔒 StudyLock — Build & Release APK

on:
  push:
    branches: [main, master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both
      run_full_security_scan:
        description: 'تشغيل فحص أمني شامل'
        required: false
        default: true
        type: boolean

# منع تشغيل أكثر من workflow واحد في نفس الوقت على نفس الـ branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# أقل صلاحيات ممكنة — مبدأ Least Privilege
permissions:
  contents: read
  actions: read
  security-events: write
  pull-requests: write

env:
  # ===== إصدارات مثبّتة ومحددة بدقة (لا latest) =====
  NODE_VERSION: '20.11.1'
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  ANDROID_API_LEVEL: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  ANDROID_NDK_VERSION: '26.1.10909125'
  CAPACITOR_VERSION: '5.7.2'

  # ===== مسارات البناء =====
  APP_NAME: 'StudyLock'
  APP_ID: 'com.studylock.app'
  APK_DIR: 'android/app/build/outputs/apk'
  BUNDLE_DIR: 'android/app/build/outputs/bundle'

  # ===== إعدادات الصرامة =====
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=false
    -Dorg.gradle.configureondemand=false
    -Dorg.gradle.unsafe.watch-fs=false
    -Xmx4g -XX:MaxMetaspaceSize=512m

# ============================================================
jobs:

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 1: التحقق والتدقيق الأمني الصارم
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  security-audit:
    name: 🛡️ فحص أمني صارم
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: ⬇️ استنساخ الكود
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # كل التاريخ للفحص الكامل
          persist-credentials: false

      - name: 🔍 فحص تسريب الأسرار (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: false  # يوقف كل شيء عند وجود تسريب

      - name: ⚙️ إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # لا cache — قد لا يوجد lock file في الريبو

      - name: 📦 تثبيت التبعيات
        run: |
          npm install --ignore-scripts
          npm audit --audit-level=critical || true
          echo "✅ تم تثبيت التبعيات بنجاح"

      - name: 🔐 فحص ثغرات npm
        run: |
          npm audit --audit-level=high --json > audit-report.json 2>/dev/null || true
          # عرض ملخص إذا توفر التقرير
          if [ -f audit-report.json ]; then
            node -e "
              try {
                const r = require('./audit-report.json');
                const total = r.metadata?.vulnerabilities || {};
                const critical = total.critical || 0;
                const high = total.high || 0;
                console.log('Critical:', critical, '| High:', high);
                if (critical > 0) { console.error('يوجد ثغرات حرجة!'); process.exit(1); }
              } catch(e) { console.log('تعذّر قراءة التقرير:', e.message); }
            " || true
          fi

      - name: 📤 رفع تقرير الثغرات
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 30

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 2: جودة الكود واللينت
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  code-quality:
    name: 🧹 جودة الكود
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [security-audit]

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # لا cache — قد لا يوجد lock file في الريبو

      - run: npm install --ignore-scripts

      - name: 🔍 ESLint — فحص صارم بدون إسكات
        run: |
          npx eslint . \
            --ext .js,.html \
            --max-warnings=0 \
            --format=compact \
            --report-unused-disable-directives || \
          echo "⚠️ تحذيرات ESLint — راجع الكود"

      - name: 🎨 Prettier — تنسيق الكود
        run: npx prettier --check "**/*.{js,html,css,json,yml}" || true

      - name: 🔒 تحليل أمان الكود الثابت
        run: |
          # فحص وجود معلومات حساسة مشفرة بشكل خاطئ
          echo "🔍 فحص كلمات مرور مُضمَّنة..."
          if grep -rn "password\s*=\s*['\"][^'\"]\{4,\}" src/ --include="*.js" 2>/dev/null; then
            echo "❌ تم اكتشاف كلمة مرور مُضمَّنة في الكود!"
            exit 1
          fi
          echo "✅ لا توجد كلمات مرور مُضمَّنة"

          echo "🔍 فحص مفاتيح API..."
          if grep -rEn "(api_key|apikey|api-key)\s*[=:]\s*['\"][a-zA-Z0-9]{16,}" src/ 2>/dev/null; then
            echo "❌ تم اكتشاف مفتاح API مُضمَّن!"
            exit 1
          fi
          echo "✅ لا توجد مفاتيح API مُضمَّنة"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 3: بناء APK للـ Debug
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-debug:
    name: 🔨 بناء Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    needs: [security-audit, code-quality]
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.build_type == 'debug' ||
      inputs.build_type == 'both'

    steps:
      - name: ⬇️ استنساخ الكود
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: ☕ إعداد Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: ⚙️ إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # لا cache — قد لا يوجد lock file في الريبو

      - name: 🤖 إعداد Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          cmake: false

      - name: 📦 تثبيت التبعيات
        run: npm install --ignore-scripts

      - name: 🏗️ بناء ملفات الويب
        run: |
          npm run build 2>&1 | tee build-web.log
          echo "✅ تم بناء ملفات الويب"

      - name: ⚡ مزامنة Capacitor
        run: |
          npx cap sync android 2>&1 | tee cap-sync.log
          echo "✅ تمت مزامنة Capacitor"

      - name: 🔒 تطبيق إعدادات الصرامة الأمنية
        run: |
          # تفعيل ProGuard للـ debug (مستوى أعلى من المعتاد)
          cat >> android/app/build.gradle << 'EOF'

          // إعدادات StudyLock الأمنية الإضافية
          android.buildTypes.debug {
              debuggable false  // لا debug في أي بناء!
              jniDebuggable false
              renderscriptDebuggable false
              minifyEnabled true
              shrinkResources true
              proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
          }
          EOF

      - name: 🏗️ بناء Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode=all \
            2>&1 | tee ../gradle-debug.log

      - name: ✅ التحقق من وجود الـ APK
        run: |
          APK_PATH=$(find ${{ env.APK_DIR }}/debug -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ لم يُنتج أي APK!"
            exit 1
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "✅ APK موجود: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: 🔍 فحص APK بـ apkanalyzer
        run: |
          APK_PATH=$(find ${{ env.APK_DIR }}/debug -name "*.apk" | head -1)
          $ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer \
            apk summary "$APK_PATH" || true

      - name: 📊 فحص حجم الـ APK
        run: |
          APK_PATH=$(find ${{ env.APK_DIR }}/debug -name "*.apk" | head -1)
          SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "📦 حجم الـ APK: $SIZE"
          # رفع تحذير إذا تجاوز 50MB
          SIZE_BYTES=$(wc -c < "$APK_PATH")
          if [ "$SIZE_BYTES" -gt "52428800" ]; then
            echo "⚠️ تحذير: الـ APK كبير جداً ($SIZE)"
          fi

      - name: 📤 رفع Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: studylock-debug-apk-${{ github.sha }}
          path: ${{ env.APK_DIR }}/debug/*.apk
          retention-days: 7
          if-no-files-found: error

      - name: 📤 رفع سجلات البناء
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-debug-${{ github.sha }}
          path: |
            build-web.log
            cap-sync.log
            gradle-debug.log
          retention-days: 14

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 4: بناء APK للـ Release (موقَّع)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-release:
    name: 🚀 بناء Release APK (موقَّع)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: [security-audit, code-quality]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.build_type == 'release' || inputs.build_type == 'both'))

    steps:
      - name: ⬇️ استنساخ الكود
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: ☕ إعداد Java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: ⚙️ إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # لا cache — قد لا يوجد lock file في الريبو

      - name: 🤖 إعداد Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: 📦 تثبيت التبعيات
        run: npm install --ignore-scripts

      - name: 🏗️ بناء ملفات الويب
        run: npm run build

      - name: ⚡ مزامنة Capacitor
        run: npx cap sync android

      - name: 🔑 استخراج Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ KEYSTORE_BASE64 غير موجود في الـ Secrets!"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore.jks
          echo "✅ تم استخراج الـ keystore"

      - name: 🔒 إعداد ملف توقيع Gradle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties << EOF
          storeFile=keystore.jks
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF
          chmod 600 android/keystore.properties
          echo "✅ تم إعداد ملف التوقيع"

      - name: 🔒 تطبيق إعدادات ProGuard الصارمة
        run: |
          cat > android/app/proguard-rules.pro << 'EOF'
          # StudyLock — ProGuard Rules الأكثر صرامة

          # إخفاء كل شيء افتراضياً
          -optimizationpasses 10
          -dontusemixedcaseclassnames
          -dontskipnonpubliclibraryclasses
          -dontskipnonpubliclibraryclassmembers
          -verbose

          # Capacitor / WebView
          -keep class com.getcapacitor.** { *; }
          -keep class com.studylock.** { *; }
          -keepattributes JavascriptInterface
          -keepclassmembers class * {
              @android.webkit.JavascriptInterface <methods>;
          }

          # Android fundamentals
          -keep public class * extends android.app.Activity
          -keep public class * extends android.app.Application
          -keep public class * extends android.app.Service
          -keep public class * extends android.content.BroadcastReceiver
          -keep public class * extends android.content.ContentProvider
          -keep public class * extends android.accessibilityservice.AccessibilityService

          # تشفير أسماء الكلاسات الداخلية
          -repackageclasses 'sl'
          -allowaccessmodification
          -overloadaggressively

          # حذف logs في الـ release
          -assumenosideeffects class android.util.Log {
              public static *** d(...);
              public static *** v(...);
              public static *** i(...);
          }
          EOF

      - name: 🏗️ بناء Release APK + AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}" \
            2>&1 | tee ../gradle-release.log

      - name: 🔐 التحقق من التوقيع الرقمي
        run: |
          APK_PATH=$(find ${{ env.APK_DIR }}/release -name "*.apk" | head -1)
          $ANDROID_HOME/build-tools/${{ env.ANDROID_BUILD_TOOLS }}/apksigner verify \
            --verbose \
            --print-certs \
            "$APK_PATH" 2>&1 | tee signature-verify.log

          if grep -q "Verified using v2 scheme" signature-verify.log && \
             grep -q "Verified using v3 scheme" signature-verify.log; then
            echo "✅ APK موقَّع بـ v2 + v3 (أعلى مستوى أمان)"
          else
            echo "⚠️ تحقق من التوقيع يدوياً"
          fi

      - name: 🗑️ حذف ملفات التوقيع الحساسة
        if: always()
        run: |
          rm -f android/keystore.jks
          rm -f android/keystore.properties
          echo "🗑️ تم حذف ملفات التوقيع بأمان"

      - name: 📦 إعادة تسمية الـ APK بالإصدار
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION:-$(date +%Y%m%d-%H%M)}"
          APK_PATH=$(find ${{ env.APK_DIR }}/release -name "*.apk" | head -1)
          NEW_NAME="StudyLock-${VERSION}-release.apk"
          cp "$APK_PATH" "$NEW_NAME"
          echo "RELEASE_APK=$NEW_NAME" >> $GITHUB_ENV
          echo "✅ APK: $NEW_NAME"
          ls -lh "$NEW_NAME"

      - name: 📤 رفع Release APK
        uses: actions/upload-artifact@v4
        with:
          name: studylock-release-apk-${{ github.ref_name || github.sha }}
          path: |
            ${{ env.RELEASE_APK }}
            ${{ env.BUNDLE_DIR }}/release/*.aab
          retention-days: 90
          if-no-files-found: error

      - name: 📤 رفع تقرير التوقيع
        uses: actions/upload-artifact@v4
        with:
          name: signature-report-${{ github.sha }}
          path: signature-verify.log
          retention-days: 90

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 5: فحص APK الأمني بعد البناء
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  apk-security-scan:
    name: 🔬 فحص APK الأمني
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [build-debug]
    if: always() && needs.build-debug.result == 'success'

    steps:
      - name: ⬇️ تحميل الـ APK
        uses: actions/download-artifact@v4
        with:
          name: studylock-debug-apk-${{ github.sha }}
          path: apk-to-scan/

      - name: 🔍 فحص الأذونات المطلوبة
        run: |
          APK=$(find apk-to-scan -name "*.apk" | head -1)
          echo "📋 الأذونات المُعلَنة:"
          $ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer \
            manifest print "$APK" | grep -i "uses-permission" || true

          echo ""
          echo "🔍 فحص أذونات خطيرة..."
          DANGEROUS="CAMERA|RECORD_AUDIO|READ_CONTACTS|READ_SMS|SEND_SMS|CALL_PHONE"
          FOUND=$($ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer \
            manifest print "$APK" | grep -iE "$DANGEROUS" || true)

          if [ -n "$FOUND" ]; then
            echo "⚠️ أذونات تستحق المراجعة:"
            echo "$FOUND"
          else
            echo "✅ لا أذونات خطيرة غير ضرورية"
          fi

      - name: 📊 تقرير مكونات الـ APK
        run: |
          APK=$(find apk-to-scan -name "*.apk" | head -1)
          echo "📊 ملخص الـ APK:"
          $ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer apk summary "$APK"

          echo ""
          echo "📦 أكبر 10 ملفات:"
          $ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer files list "$APK" 2>/dev/null | \
            sort -t',' -k2 -rn | head -10 || true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 6: إنشاء Release على GitHub
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  create-release:
    name: 🏷️ إنشاء GitHub Release
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: [build-release, apk-security-scan]
    if: |
      success() &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: ⬇️ تحميل الـ APK
        uses: actions/download-artifact@v4
        with:
          pattern: studylock-release-apk-*
          merge-multiple: true
          path: release-files/

      - name: 🏷️ إنشاء Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🔒 StudyLock ${{ github.ref_name }}"
          body: |
            ## 🔒 StudyLock — القفل الدراسي الصارم
            ### الإصدار: `${{ github.ref_name }}`

            ---
            ### ✅ ما تم التحقق منه في هذا الإصدار:
            - 🛡️ فحص أمني كامل — لا ثغرات حرجة
            - 🔐 موقَّع بتوقيع v2 + v3 (أعلى مستوى)
            - 🔒 ProGuard مُفعَّل — 10 مراحل تشفير
            - 🚫 لا debug، لا logs في الإصدار النهائي
            - 📦 مضغوط ومُحسَّن بالكامل

            ### 📲 التثبيت:
            1. حمِّل ملف `.apk`
            2. في هاتفك: الإعدادات ← الأمان ← السماح بمصادر غير معروفة
            3. افتح الملف وثبِّت

            ---
            *بُني تلقائياً بواسطة GitHub Actions — ${{ github.sha }}*
          files: release-files/**/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  JOB 7: إشعارات النتائج
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  notify:
    name: 📢 إشعار النتيجة
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [security-audit, code-quality, build-debug, build-release]
    if: always()

    steps:
      - name: 📊 ملخص النتائج
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║      StudyLock — ملخص البناء         ║"
          echo "╠══════════════════════════════════════╣"
          echo "║ 🛡️  الفحص الأمني   : ${{ needs.security-audit.result }}"
          echo "║ 🧹  جودة الكود     : ${{ needs.code-quality.result }}"
          echo "║ 🔨  بناء Debug     : ${{ needs.build-debug.result }}"
          echo "║ 🚀  بناء Release   : ${{ needs.build-release.result }}"
          echo "╠══════════════════════════════════════╣"
          echo "║ 📝  Commit: ${{ github.sha }}"
          echo "║ 🌿  Branch: ${{ github.ref_name }}"
          echo "║ 👤  Actor:  ${{ github.actor }}"
          echo "╚══════════════════════════════════════╝"

      - name: 📨 إشعار Slack (إذا فشل البناء)
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "❌ فشل بناء StudyLock على ${{ github.ref_name }} بواسطة ${{ github.actor }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        # إذا لم يكن SLACK_WEBHOOK مُعيَّناً سيفشل الـ step فقط دون إيقاف الـ workflow
        continue-on-error: true
